events {
    worker_connections 1024;
}

http {
    # 定义连接升级变量
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    
    # Web流量和隧道流量分开代理
    upstream teleport_web {
        server <TELEPORT_IP>:3080;  # Teleport Web端口 (原 172.18.0.2)
    }
    
    upstream teleport_tunnel {
        server <TELEPORT_IP>:3024;  # Teleport 隧道端口 (原 172.18.0.2)
    }

    # HTTP 重定向
    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;
        return 301 https://$server_name$request_uri;
    }

    # HTTPS 代理 - 主配置
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        
        server_name yourdomain.com www.yourdomain.com;
        
        # 替换为你的实际证书文件名
        ssl_certificate /etc/ssl/your_domain_bundle.crt;
        ssl_certificate_key /etc/ssl/your_domain.key;

        # SSL 配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        
        # 安全头
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # 1. 首先处理 WebSocket 和隧道连接
        # Teleport SSH/K8s/DB 隧道连接
        location ~ ^/(v1/webapi/connect|v2/namespaces/.+/exec|api/v1/websocket) {
            # 记录隧道流量日志
            access_log /var/log/nginx/teleport_tunnel.log;
            
            proxy_pass https://teleport_tunnel;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # 长连接超时设置
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 86400s;
            
            # 禁用缓冲
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
        }
        
        # 2. Web终端连接
        location /webapi/sites/ {
            proxy_pass https://teleport_tunnel;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }
        
        # 3. 默认路由 - Web UI
        location / {
            # 限制 HTTP 方法
            limit_except GET POST PUT DELETE HEAD OPTIONS {
                deny all;
            }
            
            proxy_pass https://teleport_web;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering off;
        }
    }
}